name: journalee
description: A collaborative journaling app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Supabase
  supabase_flutter: ^2.0.0

  # UI & Navigation
  go_router: ^12.1.3
  flutter_svg: ^2.0.9

  # Utilities
  intl: ^0.19.0
  uuid: ^4.2.1
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  flutter_dotenv: ^5.1.0

  # Rich Text Editor
  flutter_quill: ^2.0.7

  # Notifications
  flutter_local_notifications: ^16.3.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env
